<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRIflow | Management</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 15px; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #0f172a; border: 1px solid #3b82f6; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .stat-val { font-size: 28px; font-weight: bold; color: #3b82f6; display: block; }
        .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        .job-card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 0; border-bottom: 1px solid #1e293b; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-complete { background: #16a34a; margin-bottom: 8px; }
        .btn-quit { background: #dc2626; }
        .client-name { font-size: 15px; font-weight: bold; color: white; display: block; }
        .client-info { font-size: 11px; color: #64748b; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 22px; font-weight: bold; color: #3b82f6;">ASTRI<span style="color:white">flow</span></div>
        <a href="index.html" style="color: #475569; text-decoration: none; font-size: 12px; border: 1px solid #1e293b; padding: 6px 12px; border-radius: 6px;">EXIT</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-val">12</span>
            <span class="stat-label">Leads Grabbed</span>
        </div>
        <div class="stat-card">
            <span class="stat-val">4</span>
            <span class="stat-label">Active Techs</span>
        </div>
    </div>

    <div class="job-card">
        <h3 style="margin:0 0 15px 0; font-size:14px; color: #3b82f6; text-transform: uppercase;">Dispatch Intelligence</h3>
        <table>
            <tbody>
                <tr>
                    <td>
                        <span class="client-name">John Smith</span>
                        <span class="client-info">HVAC Installation • Somerset, KY</span>
                    </td>
                    <td id="ops-1" style="width:120px; text-align: right;">
                        <button class="btn" onclick="claim(1)">CLAIM</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function claim(id) {
            const cell = document.getElementById('ops-' + id);
            cell.innerHTML = `
                <button class="btn btn-complete" onclick="finish(this)">COMPLETE</button>
                <button class="btn btn-quit" onclick="location.reload()">QUIT</button>
            `;
        }
        function finish(btn) {
            if(confirm("Archive this job?")) {
                btn.parentElement.innerHTML = '<span style="color:#16a34a; font-weight:bold; letter-spacing:1px; font-size:12px;">ARCHIVED</span>';
            }
        }
    </script>
</body>
</html>
