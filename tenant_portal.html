<html lang="en">

    <title>ASTRIflow Management</title>

        :root { --blue: #3b82f6; --bg: #020617; --card: #0f172a; --border: #1e293b; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo { font-size: 16px; font-weight: 900; color: var(--blue); letter-spacing: -1px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 15px; }
        .box { background: var(--card); border: 1px solid var(--border); padding: 10px 0; border-radius: 4px; text-align: center; }
        .val { display: block; font-size: 18px; font-weight: bold; color: var(--blue); }
        .lbl { font-size: 8px; color: #475569; text-transform: uppercase; }
