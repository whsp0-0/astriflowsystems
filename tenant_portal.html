<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRIflow Owner</title>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .header { border-bottom: 1px solid #3b82f6; padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        /* AI Stats Bar */
        .ai-stats { display: flex; gap: 8px; margin-bottom: 12px; }
        .ai-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; flex: 1; padding: 8px; text-align: center; }
        .ai-val { display: block; font-size: 14px; font-weight: bold; color: #3b82f6; }
        .ai-lbl { font-size: 8px; color: #64748b; text-transform: uppercase; font-weight: bold; }

        /* Fleet Status */
        .fleet-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
        .tech-status { background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; padding: 8px; min-width: 90px; text-align: center; }
        .status-text { font-size: 8px; font-weight: 800; text-transform: uppercase; display: block; margin-top: 2px; line-height: 1; }
        .t-online { color: #10b981; }
        .t-busy { color: #f59e0b; }

        /* Lead Card */
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid #3b82f6; position: relative; }
        .is-emergency { border-left-color: #ef4444; }
        
        .c-head { padding: 6px 10px; background: rgba(255,255,255,0.03); font-size: 9px; color: #64748b; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        
        .urg-tag { background: #ef4444; color: white; padding: 1px 4px; border-radius: 2px; font-weight: 900; font-size: 7px; margin-left: 4px; vertical-align: middle; }

        .menu-dots { cursor: pointer; padding: 0 5px; font-size: 16px; color: #64748b; font-weight: bold; }
        .menu-content { display: none; position: absolute; right: 8px; top: 30px; background: #1e293b; border: 1px solid #3b82f6; border-radius: 4px; z-index: 10; }
        .menu-item { padding: 10px 12px; font-size: 11px; border-bottom: 1px solid #0f172a; white-space: nowrap; color: white; }

        .c-body { padding: 10px; }
        .msg { background: #000; padding: 8px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; border-left: 2px solid #3b82f6; line-height: 1.3; }
        .is-emergency .msg { border-left-color: #ef4444; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 5px; }
        .lbl { font-size: 8px; color: #64748b; text-transform: uppercase; margin-bottom: 1px; }
        .val { font-size: 12px; font-weight: 500; line-height: 1.2; }

        .badge { font-size: 9px; font-weight: 900; padding: 3px 6px; border-radius: 3px; background: #1e293b; border: 1px solid #3b82f6; color: #3b82f6; white-space: nowrap; }
        .badge-active { border-color: #10b981; color: #10b981; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; color:#3b82f6; font-size:16px;">ASTRIflow</h2>
        <span style="font-size:10px; color:#10b981; font-weight:bold;">● LIVE</span>
    </div>

    <div class="ai-stats">
        <div class="ai-box">
            <span class="ai-val">1,242</span>
            <span class="ai-lbl">AI Grabbed</span>
        </div>
        <div class="ai-box">
            <span class="ai-val">8</span>
            <span class="ai-lbl">Active Leads</span>
        </div>
        <div class="ai-box">
            <span class="ai-val">1,120</span>
            <span class="ai-lbl">Total Done</span>
        </div>
    </div>

    <div class="fleet-row">
        <div class="tech-status">
            <span style="font-size:11px; font-weight:bold;">Mike R.</span>
            <span class="status-text t-busy">ON-SITE (0:14)</span>
        </div>
        <div class="tech-status">
            <span style="font-size:11px; font-weight:bold;">Dave S.</span>
            <span class="status-text t-online">IDLE / ONLINE</span>
        </div>
    </div>

    <div class="card is-emergency" id="lead4429">
        <div class="c-head">
            <div>
                <span>#4429 • 14m</span>
                <span class="urg-tag">URGENT</span>
            </div>
            <div style="display: flex; align-items: center; gap: 6px;">
                <span class="badge badge-active">MIKE R. • ON-SITE</span>
                <div class="menu-dots" onclick="toggleMenu('m4429')">⋮</div>
                <div class="menu-content" id="m4429">
                    <div class="menu-item" onclick="alert('Claimed')">Claim Job</div>
                    <div class="menu-item" style="color:#ef4444;" onclick="finishJob('lead4429')">Force Finish</div>
                </div>
            </div>
        </div>
        <div class="c-body">
            <div class="msg">"AC is smoking. Kids are here. Call now."</div>
            <div class="grid">
                <div><span class="lbl">Customer</span><span class="val">John Miller</span></div>
                <div><span class="lbl">Source</span><span class="val" style="color:#ef4444;">CALL</span></div>
            </div>
            <div class="grid">
                <div><span class="lbl">Location</span><span class="val">1422 Oak St, Somerset</span></div>
                <div><span class="lbl">Phone</span><span class="val">(606) 555-0192</span></div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function finishJob(id) {
            const card = document.getElementById(id);
            card.style.opacity = '0';
            card.style.transition = '0.3s';
            setTimeout(() => card.remove(), 300);
        }

        window.onclick = function(e) {
            if (!e.target.matches('.menu-dots')) {
                const menus = document.getElementsByClassName("menu-content");
                for (let i = 0; i < menus.length; i++) menus[i].style.display = "none";
            }
        }
    </script>
</body>
</html>
