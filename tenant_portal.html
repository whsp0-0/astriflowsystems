<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRIflow | Terminal</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 20px; font-weight: 800; color: #3b82f6; }
        .emergency { color: #ef4444; font-size: 10px; font-weight: bold; border: 1px solid #ef4444; padding: 3px 8px; border-radius: 4px; }

        /* The 3-Box Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .box { background: #0f172a; border: 1px solid #1e293b; padding: 15px 5px; border-radius: 6px; text-align: center; }
        .val { display: block; font-size: 22px; font-weight: bold; color: #3b82f6; }
        .lbl { font-size: 9px; color: #64748b; text-transform: uppercase; margin-top: 4px; }

        /* Fleet Operations */
        .monitor { background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; margin-bottom: 20px; }
        .m-head { background: #1e293b; padding: 8px 12px; font-size: 11px; font-weight: bold; color: #94a3b8; border-radius: 6px 6px 0 0; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1e293b; font-size: 13px; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #16a34a; box-shadow: 0 0 8px #16a34a; }

        /* Job Card */
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 20px; position: relative; }
        .dots { position: absolute; top: 15px; right: 15px; color: #475569; font-size: 20px; }
        .job-b { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: block; }
        .line { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
        .tag { color: #475569; font-weight: bold; width: 75px; display: inline-block; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; margin-top: 15px; }
        .btn-claim { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ASTRI<span style="color:white">flow</span></div>
        <div class="emergency">SESSION: SECURE</div>
    </div>

    <div class="grid">
        <div class="box"><span class="val">12</span><span class="lbl">Leads</span></div>
        <div class="box"><span class="val">03</span><span class="lbl">Units</span></div>
        <div class="box"><span class="val">98%</span><span class="lbl">Uptime</span></div>
    </div>

    <div class="monitor">
        <div class="m-head">FLEET OPERATIONS</div>
        <div class="row"><span>UNIT_01 (Mobile)</span> <span><span class="dot online"></span> ONLINE</span></div>
        <div class="row" style="border:none;"><span>UNIT_02 (Standby)</span> <span><span class="dot" style="background:#ca8a04"></span> READY</span></div>
    </div>

    <div class="card">
        <div class="dots">⋮</div>
        <span class="job-b">John Smith</span>
        <div class="line"><span class="tag">LOCATION:</span> Somerset, KY</div>
        <div class="line"><span class="tag">PHONE:</span> (606) 555-0199</div>
        <div class="line"><span class="tag">SERVICE:</span> HVAC Install</div>
        <button class="btn btn-claim" onclick="alert('Dispatch Initiated')">CLAIM & START DISPATCH</button>
    </div>
</body>
</html>
