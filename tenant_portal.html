<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRIflow Jobs</title>
    <style>
        body { background: #0a0e17; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #111827; border: 1px solid #1e293b; padding: 15px; border-radius: 8px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid #1e293b; }
        .btn { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; }
        .btn-done { background: #16a34a; margin-bottom: 5px; }
        .btn-quit { background: #dc2626; }
        .tag { font-size: 10px; background: #334155; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:#3b82f6; margin:0;">ASTRIflow</h2>
        <a href="index.html" style="color:#64748b; text-decoration:none; font-size:12px;">← Exit</a>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size:14px;">Active Dispatch Board</h3>
        <table>
            <tbody id="board">
                <tr>
                    <td><b>John Smith</b><br><span class="tag">HVAC - Available</span></td>
                    <td id="cell-1" style="width:100px;">
                        <button class="btn" onclick="claim(1)">Claim</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function claim(id) {
            const cell = document.getElementById('cell-' + id);
            cell.innerHTML = `
                <button class="btn btn-done" onclick="finish(this)">Complete</button>
                <button class="btn btn-quit" onclick="location.reload()">Quit</button>
            `;
        }
        function finish(btn) {
            if(confirm("Mark as Finished?")) {
                btn.parentElement.innerHTML = '<span style="color:#16a34a; font-weight:bold;">ARCHIVED</span>';
            }
        }
    </script>
</body>
</html>
