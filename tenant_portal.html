<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRIflow | Command</title>
    <style>
        :root { --blue: #3b82f6; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        body { background: var(--bg); color: #f8fafc; font-family: -apple-system, sans-serif; margin: 0; padding: 12px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-size: 18px; font-weight: 900; color: var(--blue); letter-spacing: -1px; }
        .session-tag { font-size: 9px; color: #ef4444; border: 1px solid #ef4444; padding: 2px 6px; border-radius: 2px; font-weight: bold; }

        /* The Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .box { background: var(--card); border: 1px solid var(--border); padding: 12px 0; border-radius: 4px; text-align: center; }
        .val { display: block; font-size: 20px; font-weight: bold; color: var(--blue); }
        .lbl { font-size: 8px; color: #475569; text-transform: uppercase; margin-top: 2px; }

        /* Fleet Monitor */
        .monitor { background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; }
        .m-head { background: var(--border); padding: 6px 10px; font-size: 9px; color: #94a3b8; font-weight: bold; }
        .row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); font-size: 11px; }
        .dot { height: 6px; width: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .on { background: #16a34a; box-shadow: 0 0 5px #16a34a; }

        /* Dispatch Card */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 15px; position: relative; border-left: 3px solid var(--blue); }
        .dots { position: absolute; top: 12px; right: 12px; color: #334155; font-weight: bold; }
        .j-name { font-size: 15px; font-weight: bold; margin-bottom: 10px; display: block; }
        .j-line { font-size: 11px; color: #94a3b8; margin-bottom: 4px; display: flex; }
        .j-tag { width: 65px; color: #475569; font-weight: bold; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 3px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-green { background: #16a34a; color: white; }
        .btn-gray { background: #334155; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ASTRI<span style="color:white">flow</span></div>
        <div class="session-tag">SECURE_NODE</div>
    </div>

    <div class="grid">
        <div class="box"><span class="val">12</span><span class="lbl">Leads</span></div>
        <div class="box"><span class="val">03</span><span class="lbl">Units</span></div>
        <div class="box"><span class="val">98%</span><span class="lbl">Uptime</span></div>
    </div>

    <div class="monitor">
        <div class="m-head">FLEET OPERATIONS</div>
        <div class="row"><span>UNIT_01 (Mobile)</span> <span><span class="dot on"></span> ONLINE</span></div>
        <div class="row" style="border:none;"><span>UNIT_02 (Standby)</span> <span><span class="dot" style="background:#ca8a04"></span> READY</span></div>
    </div>

    <div class="card" id="card">
        <div class="dots">⋮</div>
        <span class="j-name">John Smith</span>
        <div class="j-line"><span class="j-tag">LOC:</span> Somerset, KY</div>
        <div class="j-line"><span class="j-tag">TEL:</span> (606) 555-0199</div>
        <div class="j-line"><span class="j-tag">STATUS:</span> <span id="status" style="color:var(--blue); font-weight:bold;">AVAILABLE</span></div>
        
        <div id="action-zone">
            <button class="btn btn-blue" onclick="claim()">Claim & Dispatch</button>
        </div>
    </div>

    <script>
        function claim() {
            document.getElementById('status').innerText = "EN ROUTE";
            document.getElementById('status').style.color = "#ca8a04";
            document.getElementById('action-zone').innerHTML = `
                <div class="btn-row">
                    <button class="btn btn-green" onclick="finish()">Complete</button>
                    <button class="btn btn-gray" onclick="location.reload()">Abort</button>
                </div>`;
        }
        function finish() {
            if(confirm("Archive lead?")) {
                document.getElementById('card').style.opacity = "0.2";
                document.getElementById('action-zone').innerHTML = '<div style="text-align:center; font-size:10px; color:#16a34a; font-weight:bold; padding:10px;">ARCHIVED</div>';
            }
        }
    </script>
</body>
</html>
