<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRIflow | Management Terminal</title>
    <style>
        :root { --blue: #3b82f6; --red: #ef4444; --green: #16a34a; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* Header & Emergency */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 22px; font-weight: bold; color: var(--blue); }
        .emergency-status { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red); color: var(--red); padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Status Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .box { background: var(--card); border: 1px solid var(--border); padding: 15px 5px; border-radius: 8px; text-align: center; }
        .val { display: block; font-size: 24px; font-weight: bold; color: var(--blue); }
        .lbl { font-size: 9px; color: #64748b; text-transform: uppercase; margin-top: 4px; }

        /* Employee/Fleet Monitor */
        .monitor { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; }
        .mon-head { background: #1e293b; padding: 8px 12px; font-size: 11px; font-weight: bold; color: #94a3b8; border-radius: 8px 8px 0 0; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .idle { background: #ca8a04; }

        /* Job Card with CLAIM and Three-Dot Style */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .menu-dots { position: absolute; top: 15px; right: 15px; color: #64748b; cursor: pointer; font-size: 20px; line-height: 1; }
        .job-info { margin-bottom: 15px; }
        .job-info b { display: block; font-size: 18px; margin-bottom: 5px; }
        .job-info span { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 3px; }

        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-claim { background: var(--blue); color: white; }
        .btn-claim:active { background: #2563eb; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-done { background: var(--green); color: white; }
        .btn-quit { background: #334155; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ASTRI<span style="color:white">flow</span></div>
        <div class="emergency-status">SIGNAL: ACTIVE</div>
    </div>

    <div class="grid">
        <div class="box"><span class="val">12</span><span class="lbl">Leads</span></div>
        <div class="box"><span class="val">03</span><span class="lbl">Units</span></div>
        <div class="box"><span class="val">98%</span><span class="lbl">Success</span></div>
    </div>

    <div class="monitor">
        <div class="mon-head">FLEET OPERATIONS STATUS</div>
        <div class="row"><span>Tech_01 (Mobile)</span> <span><span class="dot online"></span> ONLINE</span></div>
        <div class="row"><span>Tech_02 (Standby)</span> <span><span class="dot idle"></span> IDLE</span></div>
    </div>

    <div class="card" id="dispatch-card">
        <div class="menu-dots" onclick="alert('Accessing Lead Options...')">⋮</div>
        <div class="job-info">
            <b>John Smith</b>
            <span>LOCATION: Somerset, KY</span>
            <span>PHONE: (606) 555-0199</span>
            <span>STATUS: <strong id="st-txt" style="color: var(--blue)">AVAILABLE</strong></span>
        </div>

        <div id="btn-zone">
            <button class="btn btn-claim" onclick="claimJob()">CLAIM & INITIATE DISPATCH</button>
        </div>
    </div>

    <script>
        function claimJob() {
            document.getElementById('st-txt').innerText = "IN PROGRESS";
            document.getElementById('st-txt').style.color = "#ca8a04";
            document.getElementById('btn-zone').innerHTML = `
                <div class="action-btns">
                    <button class="btn btn-done" onclick="completeJob()">COMPLETE</button>
                    <button class="btn btn-quit" onclick="location.reload()">ABORT</button>
                </div>
            `;
        }
        function completeJob() {
            if(confirm("Confirm archiving?")) {
                document.getElementById('dispatch-card').style.opacity = "0.3";
                document.getElementById('btn-zone').innerHTML = '<div style="text-align:center; color:var(--green); font-weight:bold;
