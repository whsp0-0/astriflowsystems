<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRIflow Management</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #0f172a; border: 1px solid #3b82f6; padding: 12px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 22px; font-weight: bold; color: #3b82f6; display: block; }
        .stat-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; }
        .job-card { background: #0f172a; border: 1px solid #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .job-header { font-size: 14px; font-weight: bold; color: #3b82f6; margin-bottom: 10px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .data-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        .label { color: #64748b; }
        .value { color: white; font-weight: 500; }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-claim { background: #3b82f6; color: white; }
        .btn-complete { background: #16a34a; color: white; }
        .btn-quit { background: #dc2626; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight: bold; color: #3b82f6;">ASTRI<span style="color:white">flow</span></div>
        <div style="font-size: 10px; color: #475569;">MGMT_PROT_V1</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-val">12</span>
            <span class="stat-label">Leads Grabbed</span>
        </div>
        <div class="stat-card">
            <span class="stat-val">Online</span>
            <span class="stat-label">System Status</span>
        </div>
    </div>

    <div class="job-card" id="lead-1">
        <div class="job-header">ACTIVE DISPATCH</div>
        <div class="data-row"><span class="label">Customer:</span> <span class="value">John Smith</span></div>
        <div class="data-row"><span class="label">Location:</span> <span class="value">Somerset, KY 42501</span></div>
        <div class="data-row"><span class="label">Phone:</span> <span class="value">(606) 555-0199</span></div>
        <div class="data-row"><span class="label">Time:</span> <span class="value">08:30 AM</span></div>
        <div class="data-row"><span class="label">Status:</span> <span class="value" id="status-1" style="color: #3b82f6;">Available</span></div>
        
        <div id="actions-1">
            <button class="btn btn-claim" onclick="claim(1)">CLAIM JOB</button>
        </div>
    </div>

    <script>
        function claim(id) {
            document.getElementById('status-'+id).innerText = "In Progress";
            document.getElementById('status-'+id).style.color = "#ca8a04";
            document.getElementById('actions-'+id).innerHTML = `
                <div class="btn-group">
                    <button class="btn btn-complete" onclick="finish(${id})">COMPLETE</button>
                    <button class="btn btn-quit" onclick="location.reload()">QUIT</button>
                </div>
            `;
        }
        function finish(id) {
            if(confirm("Archive lead?")) {
                document.getElementById('lead-'+id).style.opacity = "0.4";
                document.getElementById('actions-'+id).innerHTML = '<div style="text-align:center; font-size:12px; color:#16a34a; font-weight:bold; margin-top:10px;">ARCHIVED</div>';
            }
        }
    </script>
</body>
</html>
