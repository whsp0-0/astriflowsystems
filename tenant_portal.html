<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRIflow | Terminal</title>
    <style>
        :root { --neon-blue: #3b82f6; --bg-dark: #020617; --card-bg: #0f172a; --border: #1e293b; }
        body { background: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 12px; }
        
        /* Compact Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-size: 18px; font-weight: 800; letter-spacing: -1px; color: var(--neon-blue); }
        .emergency-btn { background: #ef4444; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        /* The "Nice Organized Boxes" Grid */
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .data-box { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 5px; border-radius: 4px; text-align: center; }
        .data-val { display: block; font-size: 18px; font-weight: bold; color: var(--neon-blue); }
        .data-label { font-size: 8px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* Fleet/Employee Status - Fluid & Compact */
        .fleet-monitor { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .fleet-header { background: #1e293b; padding: 5px 10px; font-size: 10px; font-weight: bold; color: #94a3b8; display: flex; justify-content: space-between; }
        .tech-row { display: flex; justify-content: space-between; padding: 8px 10px; font-size: 11px; border-bottom: 1px solid var(--border); }
        .dot { height: 6px; width: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .online { background: #16a34a; box-shadow: 0 0 5px #16a34a; }
        .idle { background: #ca8a04; box-shadow: 0 0 5px #ca8a04; }
        .offline { background: #475569; }

        /* Job Dispatch - High Info Density */
        .dispatch-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px; position: relative; }
        .card-tag { position: absolute; top: 12px; right: 12px; font-size: 9px; color: var(--neon-blue); font-weight: bold; }
        .job-name { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: white; }
        .job-detail { font-size: 11px; color: #94a3b8; margin-bottom: 4px; display: flex; }
        .detail-label { width: 65px; color: #475569; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 12px; }
        .btn { padding: 8px; border: none; border-radius: 3px; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-claim { background: var(--neon-blue); color: white; grid-column: span 2; }
        .btn-done { background: #16a34a; color: white; }
        .btn-quit { background: #334155; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ASTRI<span style="color:white">flow</span></div>
        <button class="emergency-btn" onclick="alert('EMERGENCY BROADCAST SENT')">SIGNAL EMERGENCY</button>
    </div>

    <div class="dashboard-grid">
        <div class="data-box">
            <span class="data-val">12</span>
            <span class="data-label">Leads</span>
        </div>
        <div class="data-box">
            <span class="data-val">04</span>
            <span class="data-label">Units</span>
        </div>
        <div class="data-box">
            <span class="data-val">98%</span>
            <span class="data-label">Success</span>
        </div>
    </div>

    <div class="fleet-monitor">
        <div class="fleet-header"><span>FLEET OPERATIONS</span> <span>STATUS</span></div>
        <div class="tech-row"><span>Unit_01 (Mobile)</span> <span><span class="dot online"></span> ONLINE</span></div>
        <div class="tech-row"><span>Unit_02 (Standby)</span> <span><span class="dot idle"></span> IDLE</span></div>
        <div class="tech-row" style="border:none;"><span>Unit_03 (Somerset)</span> <span><span class="dot offline"></span> OFFLINE</span></div>
    </div>

    <div class="dispatch-card" id="card-1">
        <span class="card-tag">NEW LEAD</span>
        <div class="job-name">John Smith</div>
        <div class="job-detail"><span class="detail-label">LOCATION:</span> <span style="color:white">Somerset, KY</span></div>
        <div class="job-detail"><span class="detail-label">PHONE:</span> <span style="color:white">(606) 555-0199</span></div>
        <div class="job-detail"><span class="detail-label">TIME:</span> <span style="color:white">08:35 AM</span></div>
        <div class="job-detail"><span class="detail-label">STATUS:</span> <span id="status-1" style="color: var(--neon-blue)">PENDING</span></div>

        <div id="actions-1" class="btn-row">
            <button class="btn btn-claim" onclick="claim(1)">INITIATE DISPATCH</button>
        </div>
    </div>

    <script>
        function claim(id) {
            document.getElementById('status-'+id).innerText = "EN ROUTE";
            document.getElementById('status-'+id).style.color = "#ca8a04";
            document.getElementById('actions-1').innerHTML = `
                <button class="btn btn-done" onclick="complete(1)">MARK COMPLETE</button>
                <button class="btn btn-quit" onclick="location.reload()">FORCE ABORT</button>
            `;
        }
        function complete(id) {
            if(confirm("Archive job?")) {
                document.getElementById('card-'+id).style.opacity = "0.3";
                document.getElementById('actions-1').innerHTML = '<div style="grid-column:span 2; font-size:10px; color:#16a34a; font-weight:bold; text-align:center;">ARCHIVED</div>';
            }
        }
    </script>
</body>
</html>
