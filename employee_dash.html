<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRIflow Tech</title>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3b82f6; padding-bottom: 8px; margin-bottom: 12px; }
        .status-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; padding: 10px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .stat-lbl { font-size: 8px; color: #64748b; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 2px; }
        .timer { font-family: monospace; font-size: 18px; font-weight: bold; color: #64748b; }
        .timer-active { color: #10b981; }

        /* The Card */
        #job-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; border-left: 4px solid #ef4444; overflow: hidden; transition: 0.4s ease; }
        .c-body { padding: 12px; }
        .msg { background: #000; padding: 8px; border-radius: 4px; font-size: 12px; border-left: 2px solid #ef4444; line-height: 1.3; margin: 8px 0; }

        .footer { display: flex; gap: 8px; padding: 10px; background: #131c2e; border-top: 1px solid #1e293b; }
        .btn { flex: 1; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 11px; border: none; cursor: pointer; text-align: center; color: white; text-transform: uppercase; }
        
        /* Modal UI */
        #over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; }
        #pop { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; border: 2px solid #3b82f6; padding: 20px; border-radius: 10px; z-index: 101; width: 80%; }
        .input { width: 100%; background: #1e293b; border: 1px solid #3b82f6; color: white; padding: 10px; margin: 10px 0; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight:bold; color:#3b82f6; font-size:14px;">MIKE R.</span>
        <div style="text-align:right;"><span id="live-status" style="font-size:9px; font-weight:900; color:#64748b;">IDLE / WAITING</span></div>
    </div>

    <div class="status-box">
        <div><span class="stat-lbl">Activity</span><div id="act-txt" style="font-size:11px; font-weight:bold; color:#64748b;">IDLE</div></div>
        <div style="text-align:right;"><span class="stat-lbl">Job Clock</span><div id="clock" class="timer">00:00:00</div></div>
    </div>

    <div id="job-card">
        <div class="c-body">
            <span style="font-size:16px; font-weight:bold; display:block;">John Miller</span>
            <span style="font-size:12px; color:#3b82f6; display:block;">1422 Oak St, Somerset</span>
            <div class="msg">"AC smoking. Urgent repair needed."</div>
        </div>
        <div class="footer">
            <button id="b-claim" class="btn" style="background:#3b82f6;" onclick="startWork()">CLAIM JOB</button>
            <button id="b-finish" class="btn" style="background:#10b981; display:none;" onclick="showPop()">COMPLETE JOB</button>
        </div>
    </div>
    <div id="over" onclick="hidePop()"></div>
    <div id="pop">
        <h4 style="margin:0; color:#3b82f6; font-size:14px;">Finish Job</h4>
        <input type="number" id="cash" class="input" placeholder="Amount Collected ($)">
        <button class="btn" style="background:#10b981; width:100%;" onclick="finalSubmit()">SUBMIT DATA</button>
    </div>

    <script>
        let s = 0, tActive = false;

        function startWork() {
            tActive = true;
            document.getElementById('b-claim').style.display = 'none';
            document.getElementById('b-finish').style.display = 'block';
            document.getElementById('live-status').innerText = "ON-SITE / BUSY";
            document.getElementById('live-status').style.color = "#f59e0b";
            document.getElementById('act-txt').innerText = "WORKING";
            document.getElementById('act-txt').style.color = "#10b981";
            document.getElementById('clock').classList.add('timer-active');
            
            // Start Clock
            const timerInterval = setInterval(() => {
                if(tActive) {
                    s++;
                    let h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
                    document.getElementById('clock').innerText = [h,m,sec].map(v=>v<10?"0"+v:v).join(":");
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function showPop() {
            document.getElementById('over').style.display = 'block';
            document.getElementById('pop').style.display = 'block';
        }

        function hidePop() {
            document.getElementById('over').style.display = 'none';
            document.getElementById('pop').style.display = 'none';
        }

        function finalSubmit() {
            const val = document.getElementById('cash').value;
            if(!val) return alert("Enter amount!");
            
            // Kill Timer
            tActive = false;
            
            // 1. Vanishing logic
            const card = document.getElementById('job-card');
            card.style.opacity = '0';
            card.style.transform = 'translateX(100px)'; // Slide it out for effect
            
            setTimeout(() => {
                card.remove(); // Deletes it
                hidePop();
                
                // Reset Headers
                document.getElementById('live-status').innerText = "IDLE / ONLINE";
                document.getElementById('live-status').style.color = "#10b981";
                document.getElementById('act-txt').innerText = "IDLE";
                document.getElementById('act-txt').style.color = "#64748b";
                document.getElementById('clock').innerText = "00:00:00";
                document.getElementById('clock').classList.remove('timer-active');
                
                alert("Job Cleared. Synced to Owner.");
            }, 400);
        }
    </script>
</body>
</html>
