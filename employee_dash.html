<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRIflow | Tech Terminal</title>
    <style>
        :root { --blue: #3b82f6; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        body { background: var(--bg); color: #f8fafc; font-family: monospace; margin: 0; padding: 12px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tech-id { font-size: 10px; color: var(--blue); font-weight: bold; }
        
        .section-label { font-size: 9px; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .active-job { background: var(--card); border: 1px solid var(--border); border-radius: 2px; padding: 15px; border-left: 4px solid #ef4444; }
        .customer-name { font-size: 16px; font-weight: bold; display: block; margin-bottom: 15px; }
        
        .data-point { margin-bottom: 12px; }
        .label { font-size: 8px; color: #475569; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .val { font-size: 11px; color: #f8fafc; }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border: none; border-radius: 2px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: #16a34a; color: white; }
        .btn-maps { background: #334155; color: white; grid-column: span 2; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 14px; font-weight: 900; color: white;">ASTRI<span style="color:var(--blue)">flow</span></div>
        <div class="tech-id">UNIT_01 // ONLINE</div>
    </div>

    <span class="section-label">Current Assignment</span>

    <div class="active-job">
        <span class="customer-name">John Smith</span>
        
        <div class="data-point">
            <span class="label">Job Description</span>
            <span class="val">HVAC leaking fluid in attic. Diagnostic and repair.</span>
        </div>

        <div class="data-point">
            <span class="label">Phone Number</span>
            <span class="val"><a href="tel:6065550199" style="color:var(--blue); text-decoration: none;">(606) 555-0199</a></span>
        </div>

        <div class="data-point">
            <span class="label">Exact Address</span>
            <span class="val">123 Main St, Somerset, KY 42501</span>
        </div>

        <div class="action-row">
            <a href="https://www.google.com/maps/search/?api=1&query=123+Main+St+Somerset+KY" class="btn btn-maps">Open GPS Route</a>
            <button class="btn btn-green" onclick="alert('Job marked as complete.')">Complete</button>
            <button class="btn btn-blue" onclick="alert('Updating Dispatch...')">On Site</button>
        </div>
    </div>

    <div style="text-align:center; margin-top:30px;">
        <a href="index.html" style="color:#1e293b; font-size:10px; text-decoration:none;">LOGOUT TERMINAL</a>
    </div>
</body>
</html>
