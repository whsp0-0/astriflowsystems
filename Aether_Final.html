<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASTRIflow Operations</title>
    <style>
        :root {
            --bg: #020617;
            --sidebar: #0f172a;
            --card: rgba(30, 41, 59, 0.4);
            --accent-purple: #7c3aed;
            --accent-blue: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --text: #f1f5f9;
            --border: rgba(255, 255, 255, 0.06);
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Sidebar */
        aside { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .brand { padding: 25px; font-weight: 800; font-size: 1.1rem; background: linear-gradient(to right, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-link { padding: 15px 25px; cursor: pointer; color: #94a3b8; font-size: 0.85rem; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-link.active { background: rgba(124, 58, 237, 0.1); color: white; border-left-color: var(--accent-purple); }

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 30px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Unified System Health Bar */
        .system-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card); 
            padding: 15px 25px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .health-indicators { display: flex; gap: 20px; font-size: 0.8rem; color: #94a3b8; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; box-shadow: 0 0 8px var(--green); }

        /* Action Buttons */
        .btn-repair { background: var(--accent-purple); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.75rem; margin-left: 10px; }
        .btn-deploy { background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }

        /* Tenant Cards */
        .tenant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .tenant-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .tenant-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .tenant-name { font-weight: 700; font-size: 1rem; color: white; }
        .stat-small { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
        .stat-val { font-size: 0.9rem; color: var(--accent-blue); display: block; margin-bottom: 10px; }

        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent-purple); color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 100; }
    </style>
</head>
<body>

    <aside>
        <div class="brand">ASTRIflow AI</div>
        <div class="nav-link active" onclick="showView('owner', this)">Master Command</div>
        <div class="nav-link" onclick="showView('tenants', this)">Tenant Directory</div>
        <div class="nav-link" onclick="showView('staff', this)">Staff/Bots</div>
    </aside>

    <main>
        <div class="system-bar">
            <div class="health-indicators">
                <span><span class="status-dot"></span>DB</span>
                <span><span class="status-dot"></span>API</span>
                <span><span class="status-dot"></span>LLM</span>
            </div>
            <div>
                <button class="btn-repair" onclick="triggerRepair('Global System Scan')">SYSTEM REPAIR</button>
                <button class="btn-repair" style="background: var(--accent-blue);" onclick="triggerRepair('AI Auditor Deployment')">DEPLOY AUDITOR</button>
            </div>
        </div>

        <div id="owner" class="view active">
            <h2 style="font-size: 0.9rem; color: #64748b; margin-bottom: 15px;">OPERATIONAL OVERVIEW</h2>
            <div class="tenant-grid">
                <div class="tenant-card">
                    <div class="tenant-header">
                        <div>
                            <span class="tenant-name">Cool Breeze HVAC</span><br>
                            <span class="stat-small">Active Leads: 84</span>
                        </div>
                        <button class="btn-deploy" onclick="triggerRepair('Cool Breeze AI Audit')">DEPLOY AI</button>
                    </div>
                    <div style="height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px;">
                        <div style="width: 92%; height: 100%; background: var(--green); border-radius: 2px;"></div>
                    </div>
                    <span class="stat-small" style="margin-top: 5px; display: block;">AI Confidence: 92%</span>
                </div>

                <div class="tenant-card">
                    <div class="tenant-header">
                        <div>
                            <span class="tenant-name">Titan Heating & Air</span><br>
                            <span class="stat-small">Active Leads: 42</span>
                        </div>
                        <button class="btn-deploy" onclick="triggerRepair('Titan Systems Scan')">DEPLOY AI</button>
                    </div>
                    <div style="height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px;">
                        <div style="width: 78%; height: 100%; background: var(--accent-purple); border-radius: 2px;"></div>
                    </div>
                    <span class="stat-small" style="margin-top: 5px; display: block;">AI Confidence: 78%</span>
                </div>
            </div>
        </div>

        <div id="tenants" class="view">
            <h2 style="font-size: 0.9rem; color: #64748b; margin-bottom: 15px;">INDIVIDUAL TENANT MANAGEMENT</h2>
            <div class="tenant-card">
                <p style="color: #94a3b8; font-size: 0.85rem;">Registered Property Managers and HVAC Clients appear here.</p>
                <button class="btn-repair">+ ADD NEW TENANT ENTRY</button>
            </div>
        </div>
    </main>

    <div id="toast"></div>

    <script>
        function showView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            el.classList.add('active');
        }

        function triggerRepair(task) {
            const toast = document.getElementById('toast');
            toast.innerText = "Initializing: " + task + "...";
            toast.style.display = 'block';
            setTimeout(() => {
                toast.innerText = "SUCCESS: " + task + " Complete.";
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            }, 3000);
        }
    </script>
</body>
</html>
